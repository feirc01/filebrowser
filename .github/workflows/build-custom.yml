name: Build Custom FileBrowser

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '自定义版本号标签'
        required: false
        default: 'custom-latest'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X github.com/filebrowser/filebrowser/v2/cmd.Version=${{ github.event.inputs.version || 'custom-latest' }}" \
            -o filebrowser.exe \
            .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: FileBrowser Custom ${{ github.event.inputs.version }}
          body: |
            ## 自定义构建版本
            - 前后端分离架构
            - 移除内嵌前端资源
            - 需通过 `--frontendDir` 指定前端静态文件目录
          files: filebrowser.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}