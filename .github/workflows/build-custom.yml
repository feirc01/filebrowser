name: Build Custom FileBrowser

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '自定义版本号标签'
        required: false
        default: 'custom-latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X github.com/filebrowser/filebrowser/v2/cmd.Version=${{ github.event.inputs.version || 'custom-latest' }}" \
            -o filebrowser.exe \
            .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: filebrowser-windows-${{ github.event.inputs.version || 'latest' }}
          path:  filebrowser.exe
          retention-days: 30